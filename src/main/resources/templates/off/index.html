<!DOCTYPE html>
<html lang="en">

<!-- Head -->
<th:block th:replace="~{includes/off/head}" />

<body id="page-top">

    <!-- Page Wrapper -->
    <div id="wrapper">

        <!-- Sidebar -->
        <th:block th:replace="~{includes/off/sidebar}" />

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">

                <!-- Topper -->
                <th:block th:replace="~{includes/off/topper}" />

                <!-- Begin Page Content -->
                <div class="container-fluid">
                    <div class="form-group row">
                        <div class="col-sm-10">
                            <textarea class="input_param form-control" id="off_post_content" name="content" placeholder="Talk freely!" required></textarea>
                        </div>
                        <button class="btn btn-primary m-1" id="create_off_post_btn" onclick="create_off_post()">Post</button>
                    </div>
                </div>
                <!-- /.container-fluid -->

                <section class="feed">

                    <div class="container-fluid">
                        <div class="form-group row" id="off_post_list">

                            <!-- Off Post List -->

                        </div>
                        <!-- more -->
                        <div class="text-center col-sm mb-5">
                            <button class="btn btn-outline-primary">더 보기</button>
                        </div>
                    </div>

                </section>

            </div>
            <!-- End of Main Content -->


            <!-- Footer -->
            <th:block th:replace="~{includes/off/footer}" />

        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>

    <!-- Logout Modal-->
    <th:block th:replace="~{includes/off/logout}" />

    <!-- Script-->
    <th:block th:replace="~{includes/off/script}" />

    <script>
        $(document).ready(function(){
            list_off_post();
        });

        function create_off_post() {
            $.ajax({
                url: "/api/offPost",
                method: "POST",
                contentType: 'application/json; charset=utf-8',
                headers:{
                    "Authorization" : localStorage.getItem("Authorization")
                },
                data:JSON.stringify({
                    content: $('#off_post_content').val()
                }),
                success: (data, status, xhr)=>{
                    alert(JSON.stringify(data));
                    list_off_post();
                },
                error: (data, status, xhr)=>{
                    alert(JSON.stringify(data));
                }
            });
        }

        function list_off_post() {
            $.ajax({
                url: "/api/offPost/list",
                method: "GET",
                contentType : 'application/json; charset=utf-8',
                headers:{
                    "Authorization" : localStorage.getItem("Authorization")
                },
                success: (data, status, xhr)=> {
                    $("#off_post_list").html("");
                    for (let each of data) {
                        $("#off_post_list").append(
                            "<div class=\"card col-sm-10 mb-4\">"
                            + "<div class=\"card-body\">"
                            + "<div class=\"d-flex justify-content-between align-items-center mb-2\">"
                            + "<span class=\"fw-bold text-primary\">Anom</span>"
                            + "<small class=\"text-muted\">" + each["createdAt"] + "</small></div>"
                            + "<div class=\"mb-3 text-dark\">" + each["content"] + "</div><div>"
                            + "<button class=\"btn btn-outline-secondary btn-sm me-2\">좋아요 <span class=\"ms-1\">4</span></button>"
                            + "<button class=\"btn btn-outline-secondary btn-sm\" onclick='location.href=\"post/detail/" + each["id"] + "\"'>댓글 <span class=\"ms-1\">1</span></button>"
                            + "</div></div></div>"
                        );
                    }
                },
                error: (data, status, xhr) => {
                    alert(JSON.stringify(data));
                }
            });
        }
    </script>

</body>

</html>
